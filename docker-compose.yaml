services:
  postgres:
    image: postgres:15-alpine
    container_name: jordanlist-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jordanlist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jordanlist123}
      POSTGRES_DB: ${POSTGRES_DB:-jordanlist_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jordanlist-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jordanlist-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@jordanlist.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - jordanlist-network
    depends_on:
      - postgres

  backend:
    build: ./backend
    container_name: jordanlist-backend
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jordanlist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jordanlist123}
      POSTGRES_DB: ${POSTGRES_DB:-jordanlist_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-tu_secreto_super_seguro_access_cambiar_en_produccion_12345}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-tu_secreto_super_seguro_refresh_cambiar_en_produccion_67890}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY:-15m}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - jordanlist-network
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: jordanlist-frontend
    restart: always
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - jordanlist-network
    depends_on:
      - backend

volumes:
  postgres_data:
  pgadmin_data:

networks:
  jordanlist-network:
    driver: bridge
