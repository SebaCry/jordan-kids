version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jordanlist-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jordanlist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jordanlist123}
      POSTGRES_DB: ${POSTGRES_DB:-jordanlist_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jordanlist-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jordanlist-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@jordanlist.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - jordanlist-network
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:

networks:
  jordanlist-network:
    driver: bridge
